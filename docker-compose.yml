services:
  slurm-exporter:
    image: slurm-exporter:latest
    build: .
    network_mode: host
    restart: unless-stopped
    volumes:
      # SLURM binaries mounted from the host; SLURM is not installed in the image.
      - /usr/bin/squeue:/usr/bin/squeue:ro
      - /usr/bin/sinfo:/usr/bin/sinfo:ro
      - /usr/bin/scontrol:/usr/bin/scontrol:ro
      - /usr/bin/sdiag:/usr/bin/sdiag:ro
      - /usr/bin/sacctmgr:/usr/bin/sacctmgr:ro
      # SLURM configuration and Munge authentication.
      - /etc/slurm:/etc/slurm:ro
      - /run/munge:/run/munge:ro
      - /etc/munge:/etc/munge:ro
    command:
      - "--port=9410"
      - "--log-level=info"
      - "--collect-interval=15"
      - "--medium-interval=300"
    # If SLURM binaries are in a different path, specify CLI flags.
    # command:
    #   - "--squeue-path=/usr/lib64/bin/squeue"
    #   - "--sinfo-path=/usr/lib64/bin/sinfo"
