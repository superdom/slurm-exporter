scrape_configs:
  - job_name: slurm
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets:
          - "slurm-controller:9410"
    metric_relabel_configs:
      # Extract only the hostname from the instance label for node_exporter/dcgm-exporter joins.
      - source_labels: [instance]
        regex: "([^:]+):.+"
        target_label: hostname
        action: replace
