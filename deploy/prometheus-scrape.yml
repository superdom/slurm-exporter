scrape_configs:
  - job_name: slurm
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets:
          - "slurm-controller:9410"
    metric_relabel_configs:
      # instance 레이블에서 hostname만 추출 (node_exporter, dcgm-exporter join용)
      - source_labels: [instance]
        regex: "([^:]+):.+"
        target_label: hostname
        action: replace
